<!DOCTYPE html>
<html lang="ar" dir="rtl">


<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💍 زواجي</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="زواجي">

</head>

<body>

<div class="app">

    <!-- بطاقة مدة الزواج -->

    <section class="marriage-card">

        <h2>❤️ مدة الزواج</h2>

        <div id="marriageCounter">
            لم يبدأ الزواج بعد
        </div>

    </section>

    <!-- المراحل -->

    <section class="stages" id="stagesList">

</section>

    <!-- إضافة مرحلة -->

    <button id="addStage">
        ➕ إضافة مرحلة
    </button>

</div>

<!-- الخلفية -->

<div id="overlay"></div>

<!-- نافذة اختيار التاريخ -->

<!-- Bottom Sheet -->

<div id="bottomSheet">

    <div class="sheet-handle"></div>

    <h3 id="sheetTitle">
        💍 الخطبة
    </h3>

    <div class="sheet-option">

    <label for="dateInput">📅 التاريخ</label>

    <input type="date" id="dateInput">

</div>

    <div class="sheet-option" id="choosePhotos">
    🖼️ الصورة
</div>

    <button id="closeSheet">
        إلغاء
    </button>

</div>

<script src="js/storage.js"></script>
<script src="js/dates.js"></script>
<script src="js/stages.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>

</html>
