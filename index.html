<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💍 زواجي</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="زواجي">

</head>

<body>
    
    <button onclick="alert('زر شغال')">اختبار</button>

<div class="app">

    <!-- بطاقة مدة الزواج -->

    <section class="marriage-card">

        <h2>❤️ مدة الزواج</h2>

        <div id="marriageCounter">
            لم يبدأ الزواج بعد
        </div>

    </section>

    <!-- المراحل -->

    <section class="stages">

       <div class="stage" id="engagement" onclick="alert('تم الضغط')">

    <span>💍 الخطبة</span>

    <span id="engagementDate">
        لم يحدد
    </span>

</div>

        <div class="stage" id="meeting">

    <span>👀 الشوفة</span>

    <span id="meetingDate">
        —
    </span>

</div>

<div class="stage" id="contract">

    <span>🤍 عقد القران</span>

    <span id="contractDate">
        —
    </span>

</div>

<div class="stage" id="shabka">

    <span>💎 الشبكة</span>

    <span id="shabkaDate">
        —
    </span>

</div>

<div class="stage" id="wedding">

    <span>🎊 ليلة الزواج</span>

    <span id="weddingDate">
        —
    </span>

</div>

<div class="stage" id="honeymoon">

    <span>✈️ شهر العسل</span>

    <span id="honeymoonDate">
        —
    </span>

</div>

    </section>

    <!-- إضافة مرحلة -->

    <button id="addStage">
        ➕ إضافة مرحلة
    </button>

</div>

<!-- الخلفية -->

<div id="overlay"></div>

<!-- نافذة اختيار التاريخ -->

<!-- Bottom Sheet -->

<div id="bottomSheet">

    <div class="sheet-handle"></div>

    <h3 id="sheetTitle">
        💍 الخطبة
    </h3>

    <div class="sheet-option">

    <label for="dateInput">📅 التاريخ</label>

    <input type="date" id="dateInput">

</div>

    <div class="sheet-option" id="choosePhotos">
    🖼️ الصورة
</div>


    <button id="closeSheet">
        إلغاء
    </button>

</div>

<script src="js/storage.js"></script>
<script src="js/dates.js"></script>
<script src="js/stages.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>

</html>
