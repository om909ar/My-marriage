<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الصورة</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <h2 id="photoTitle">📷 الصورة</h2>

    <div class="photo-box">

        <img id="photoPreview" src="" alt="">

        <p id="noPhoto">لا توجد صورة</p>

    </div>

    <input
        type="file"
        id="photoInput"
        accept="image/*">

    <button id="savePhoto">

        حفظ الصورة

    </button>

</div>

<script src="js/storage.js"></script>
<script src="js/photo.js"></script>

</body>

</html>
